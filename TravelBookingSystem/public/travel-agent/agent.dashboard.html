<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Dashboard</title>
    <link rel="stylesheet" href="../navigation/top-navbar.css">
    <link rel="stylesheet" href="../navigation/side-nav.css">
    <link rel="stylesheet" href="agent.dashboard.css">
  </head>
  <body>

    <div id="navbar-container"></div>

    <div class="layout">
      <aside id="sidebar"></aside>

      <div class="page-content">
        <div class="content">
          <h2 class="section-title">Overview</h2>

          <div class="stats">
            <div class="stat">
              <div class="stat-number">12</div>
              <div class="stat-text">Total Bookings</div>
            </div>
            <div class="stat">
              <div class="stat-number">5</div>
              <div class="stat-text">Pending Bookings</div>
            </div>
            <div class="stat">
              <div class="stat-number">4</div>
              <div class="stat-text">Active Packages</div>
            </div>
            <div class="stat">
              <div class="stat-number">3</div>
              <div class="stat-text">Completed</div>
            </div>
          </div>

          <h2 class="section-title">Recent Bookings</h2>
          <div class="table-card">
            <table class="table">
              <thead>
                <tr>
                  <th>Traveller</th>
                  <th>Package</th>
                  <th>Destination</th>
                  <th>Status</th>
                  <th class="table-right">Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Emily Smith</td>
                  <td>Amazing Adventure Tour</td>
                  <td>Vietnam</td>
                  <td><span class="pill pill-active">Active</span></td>
                  <td class="table-right">
                    <button class="btn btn-ghost" type="button">Cancel</button>
                    <button class="btn" type="button">View</button>
                  </td>
                </tr>
                <tr>
                  <td>John Doe</td>
                  <td>Beach Getaway</td>
                  <td>Hawaii</td>
                  <td><span class="pill pill-pending">Pending</span></td>
                  <td class="table-right">
                    <button class="btn btn-ghost" type="button">Reject</button>
                    <button class="btn" type="button">Approve</button>
                  </td>
                </tr>
                <tr>
                  <td>Alice Brown</td>
                  <td>Mountain Explorer</td>
                  <td>Switzerland</td>
                  <td><span class="pill pill-completed">Completed</span></td>
                  <td class="table-right">
                    <button class="btn" type="button">View</button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="center">
            <a class="btn btn-wide" href="agent.packages.html">Manage Packages</a>
          </div>
        </div>
      </div>
    </div>

    <script src="../navigation/side-nav.js"></script>
    <script>
      fetch("../navigation/top-navbar.html")
        .then(res => res.text())
        .then(html => {
          document.getElementById("navbar-container").innerHTML = html;
          const script = document.createElement("script");
          script.src = "../navigation/top-navbar.js";
          document.body.appendChild(script);
        });
    </script>
  </body>
</html>
