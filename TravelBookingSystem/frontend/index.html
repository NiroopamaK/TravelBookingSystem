<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TripZip</title>
    <link rel="stylesheet" href="login-authentication/login.css" />
  </head>
  <body>
    <div class="container">
      <!-- Left half: background image -->
      <div class="left-half"></div>

      <!-- Right half: logo and forms -->
      <div class="right-half">
        <div class="form-container">
          <!-- Logo -->
          <img src="assets/logo.jpg" alt="Logo" class="logo" />

          <!-- Forms container -->
          <div id="formContent">
            <!-- Login form-->
            <div id="loginForm" class="form-box login-form">
              <h2>Login</h2>
              <form>
                <label>Email</label>
                <input
                  id="loginEmail"
                  type="text"
                  placeholder="Enter Email"
                  required
                />
                <label>Password</label>
                <input
                  id="loginPassword"
                  type="password"
                  placeholder="Enter Password"
                  required
                />
                <a href="#" class="forgot-password">Forgot Password?</a>
                <button type="submit" class="submit-btn">Login</button>
              </form>
              <button class="signup-link" onclick="loadSignUp()">
                Sign Up
              </button>
            </div>

            <!-- Sign Up form -->
            <div id="signupForm" class="form-box signup-form hidden">
              <h2>Sign Up</h2>

              <!-- Step 1 - Account Details -->
              <form id="signupStep1">
                <label>Role</label>
                <select id="signupRole" required>
                  <option value="">Select Role</option>
                  <option value="ADMIN">Admin</option>
                  <option value="TRAVELLER">Traveller</option>
                  <option value="TRAVEL_AGENT">Travel Agent</option>
                </select>

                <label>First Name</label>
                <input
                  id="signupFirstName"
                  type="text"
                  placeholder="Enter First Name"
                  required
                />

                <label>Last Name</label>
                <input
                  id="signupLastName"
                  type="text"
                  placeholder="Enter Last Name"
                  required
                />

                <label>Passport Number</label>
                <input
                  id="signupPassport"
                  type="text"
                  placeholder="Enter Passport Number"
                  required
                />

                <label>Address</label>
                <input
                  id="signupAddress"
                  type="text"
                  placeholder="Enter Address"
                  required
                />

                <label>Telephone Number</label>
                <input
                  id="signupTelephone"
                  type="tel"
                  placeholder="Enter Telephone Number"
                  required
                />

                <button
                  type="button"
                  class="submit-btn"
                  onclick="signupStep2()"
                >
                  Create Account
                </button>
              </form>

              <!-- Step 2 - Login Credentials -->
              <form id="signupStep2" class="hidden">
                <label>Email</label>
                <input
                  id="signupEmail"
                  type="email"
                  placeholder="Enter Email"
                  required
                />

                <label>Password</label>
                <input
                  id="signupPassword"
                  type="password"
                  placeholder="Enter Password"
                  required
                />

                <label>Re-enter Password</label>
                <input
                  id="signupPassword2"
                  type="password"
                  placeholder="Re-enter Password"
                  required
                />

                <button type="submit" class="submit-btn">
                  Finish Registration
                </button>
              </form>

              <button class="signup-link" onclick="loadLogin()">
                Back to Login
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="login-authentication/login.js"></script>
  </body>
</html>
