<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Traveller Dashboard</title>
    <link rel="stylesheet" href="traveller.dashboard.css">
  </head>
  <body>
    <!--Sidebar-->
    <body>
  <div class="layout">
    <aside id="sidebar"></aside>
    <main id="content"></main>
        </div>

  <script src="app.js"></script>
</body>
<!--Main content-->
<nav class="top-nav">
  <div class="nav-left">
    <img src="../assets/logo.jpg" alt="Logo" class="logo" />
  </div>
  <div class="nav-right">
    <span class="profile-name">Name</span>
    <span class="profile-role">Role</span>
    <div class="profile-dropdown-container">
      <img
        src="../assets/admin.png"
        alt="Profile"
        class="profile-pic"
        id="profilePic"
      />
      <div class="dropdown-menu" id="dropdownMenu">
        <a href="/frontend/edit-profile.html">Edit Profile</a>
        <a href="#" id="signOutBtn">Sign Out</a>
                </div>
            </div>
        </div>
</nav>
        <!-- Content -->
        <div class="content">
            <h2 class="section-title">My Bookings</h2>

            <div class="stats">
                <div class="stat">
                    <div class="stat-number">2</div>
                    <div class="stat-text">Upcoming Trips</div>
                </div>
                <div class="stat">
                    <div class="stat-number">1</div>
                    <div class="stat-text">Active Trip</div>
                </div>
                <div class="stat">
                    <div class="stat-number">1</div>
                    <div class="stat-text">Completed Trip</div>
                </div>
            </div>
            <!-- Table -->
            <div class="table-card">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Package</th>
                            <th>Destination</th>
                            <th>Status</th>
                            <th class="table-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Amazing Adventure Tour</td>
                            <td>Vietnam</td>
                            <td><span class="pill pill-active">Active</span></td>
                            <td class="table-right">
                                <button class="btn btn-ghost" type="button">Cancel</button>
                                <button class="btn" type="button">View</button>
                            </td>
                        </tr>
                        <tr>
                            <td>Beach Getaway</td>
                            <td>Hawaii</td>
                            <td><span class="pill pill-completed">Completed</span></td>
                            <td class="table-right">
                                <button class="btn" type="button">View</button>
                            </td>
                        </tr>
                    </table>
                </div>
            </div>
            <!-- Browse More Packages Button-->
            <div class="center">
                <button class="btn btn-wide" type="button">Browse More Packages</button>
            </div>
        </div>
    </div>
    <script src="traveller.dashboard.js"></script>
  </body>
</html>
